site_name: OSCAT Basic Dokumentation
site_url: https://oscat-basic.readthedocs.io
theme:
  name: material
  palette:
  - scheme: default
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
  - scheme: slate
    primary: indigo
    accent: indigo
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.expand
  - search.suggest
  - search.highlight
plugins:
- search
- i18n:
    docs_structure: folder
    languages:
    - locale: de
      name: Deutsch
      build: true
      default: true
    - locale: en
      name: English
      build: true
